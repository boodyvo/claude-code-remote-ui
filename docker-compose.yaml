services:
  claude-connector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - connector-data:/app/data
      - connector-claude:/home/app/.claude
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 3

volumes:
  connector-data:
  connector-claude:
