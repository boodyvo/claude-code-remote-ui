services:
  claude-connector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - connector-data:/app/data
      - connector-claude:/home/app/.claude
      - connector-projects:/app/projects
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Explicit home dir — must match the volume mount and Dockerfile ENV HOME
      - HOME=/home/app
      # Explicit DB path inside the persistent connector-data volume
      - DATABASE_PATH=/app/data/connector.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

volumes:
  connector-data:
  connector-claude:
  connector-projects:
